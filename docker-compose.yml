services:
  slack-bot:
    build: .
    container_name: slack-agent-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Taipei
    volumes:
      - ./data:/app/data
      - ./app.py:/app/app.py        # 掛載程式碼
      - ./vision.py:/app/vision.py   # 掛載程式碼
      - ./images:/app/images